services:
  redis:
    image: redis:alpine
    container_name: skrible_redis
    ports:
      - "6380:6379"

  backend:
    build: ./server 
    container_name: skrible_backend
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - PORT=3000
      - REDIS_URI=redis://redis:6379
      - BETTER_AUTH_URL=http://localhost:3000
      - NODE_ENV=development
    depends_on:
      - redis 

  frontend:
    build: ./client 
    container_name: skrible_frontend
    ports:
      - "5173:80" 
    depends_on:
      - backend